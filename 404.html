<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; color: #333; }
        h1 { font-size: 50px; }
        #loading { color: #888; }
        .hidden { display: none; }
        a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

    <div id="loader">
        <p id="loading">Checking for redirect...</p>
    </div>

    <div id="error-content" class="hidden">
        <h1>404</h1>
        <p>Oops! The page you are looking for doesn't exist.</p>
        <a href="/">Go back to Home</a>
    </div>

    <script>
        // 1. Get the path (e.g., /XDDNJS)
        const path = window.location.pathname.split('/').pop();

        // 2. Your Database
        const linkDatabase = {
            "XDDNJS": "https://google.com",
            "YT": "https://youtube.com"
        };

        // 3. The Logic
        if (path && linkDatabase[path]) {
            // Found a match! Redirecting...
            window.location.href = linkDatabase[path];
        } else {
            // No match found. Show the 404 UI.
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('error-content').classList.remove('hidden');
        }
    </script>
</body>
</html>
